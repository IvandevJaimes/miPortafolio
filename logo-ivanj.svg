<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="220" fill="url(#logoGradient)" />
  
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#020617" strokeWidth="20" opacity="0.2" />
  
  <!-- Letter I -->
  <rect x="200" y="140" width="40" height="140" rx="8" fill="#020617" />
  
  <!-- Letter J with curve -->
  <path d="M310 190 L310 250 Q310 295 265 295 Q220 295 220 250" 
        stroke="#020617" 
        strokeWidth="35" 
        strokeLinecap="round" 
        fill="none" />
  
  <!-- Decorative dot -->
  <circle cx="370" cy="140" r="25" fill="#39ff88" />
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="220" fill="url(#glowGradient)" opacity="0.3" />
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stopColor="#39ff88" />
      <stop offset="0.5" stopColor="#00ff9c" />
      <stop offset="1" stopColor="#22c55e" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="256" cy="256" r="220" gradientUnits="userSpaceOnUse">
      <stop stopColor="#39ff88" />
      <stop offset="1" stopColor="transparent" />
    </radialGradient>
  </defs>
</svg>
